services:
  resend-hermes-bridge:
    build: .
    container_name: resend-hermes-bridge
    network_mode: host
    env_file:
      - .env
    environment:
      BRIDGE_HOST_DATA_DIR: ${PWD}/data
      HERMES_HOST_HOME: /home/karx/.hermes
    volumes:
      - ./data:/app/data
      - /home/karx/.hermes/cache:/root/.hermes/cache:ro
    command: ["uvicorn", "app:app", "--host", "127.0.0.1", "--port", "8765"]
    restart: unless-stopped
    # The host Hermes proxy listens on loopback, so the bridge shares the host
    # network namespace and binds its webhook server to 127.0.0.1 for the host
    # reverse proxy.
